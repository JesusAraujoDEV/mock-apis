  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #     start_period: 10s

  # ----------------------------------------------------------
  # Frontend: Panel de Control (marcador de posición)
  # ----------------------------------------------------------
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   container_name: mock-engine-frontend
  #   restart: unless-stopped
  #   networks:
  #     - dokploy-network
  #   labels:
  #     - "traefik.enable=true"
