# ============================================================
# Motor de Mocks Dinámico - Docker Compose
# Target: Dokploy con Traefik como Reverse Proxy
# ============================================================

services:
  # ----------------------------------------------------------
  # Mock Engine (Backend + Frontend estático en un solo servicio)
  # ----------------------------------------------------------
  mockapis:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mock-engine
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_SCHEMA=${DB_SCHEMA}
      - DB_POOL_MAX=${DB_POOL_MAX:-20}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/_system/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  dokploy-network:
    external: true
