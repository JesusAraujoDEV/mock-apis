# ============================================================
# Motor de Mocks Dinámico - Docker Compose
# Target: Dokploy con Traefik como Reverse Proxy
# ============================================================

version: "3.8"

services:
  # ----------------------------------------------------------
  # Mock Engine (Backend + Frontend estático en un solo servicio)
  # ----------------------------------------------------------
  mockapis:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mock-engine
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_SCHEMA=${DB_SCHEMA}
      - DB_POOL_MAX=${DB_POOL_MAX:-20}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mock-engine.rule=Host(`${MOCK_DOMAIN}`)"
      - "traefik.http.routers.mock-engine.entrypoints=web"
      - "traefik.http.routers.mock-engine.middlewares=redirect-to-https@docker"
      - "traefik.http.routers.mock-engine-secure.rule=Host(`${MOCK_DOMAIN}`)"
      - "traefik.http.routers.mock-engine-secure.entrypoints=websecure"
      - "traefik.http.routers.mock-engine-secure.tls=true"
      - "traefik.http.routers.mock-engine-secure.tls.certresolver=letsencrypt"
      - "traefik.http.services.mock-engine.loadbalancer.server.port=3000"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/_system/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  dokploy-network:
    external: true
