# ============================================================
# Motor de Mocks Dinámico - Docker Compose
# Target: Dokploy con Traefik como Reverse Proxy
# ============================================================

version: "3.8"

services:
  # ----------------------------------------------------------
  # Backend: Mock Engine Server
  # ----------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mock-engine-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_SCHEMA=${DB_SCHEMA}
      - DB_POOL_MAX=${DB_POOL_MAX:-20}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    networks:
      - dokploy-network
    labels:
      # --- Traefik Configuration (Dokploy compatible) ---
      - "traefik.enable=true"
      
      # Router HTTP
      - "traefik.http.routers.mock-engine.rule=Host(`${MOCK_DOMAIN}`)"
      - "traefik.http.routers.mock-engine.entrypoints=web"
      - "traefik.http.routers.mock-engine.middlewares=redirect-to-https@docker"
      
      # Router HTTPS
      - "traefik.http.routers.mock-engine-secure.rule=Host(`${MOCK_DOMAIN}`)"
      - "traefik.http.routers.mock-engine-secure.entrypoints=websecure"
      - "traefik.http.routers.mock-engine-secure.tls=true"
      - "traefik.http.routers.mock-engine-secure.tls.certresolver=letsencrypt"
      
      # Servicio
      - "traefik.http.services.mock-engine.loadbalancer.server.port=3000"
      
      # Middleware: redirección HTTP -> HTTPS
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true"
      
      # Headers de seguridad
      - "traefik.http.middlewares.mock-engine-headers.headers.frameDeny=true"
      - "traefik.http.middlewares.mock-engine-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.mock-engine-headers.headers.browserXssFilter=true"
      - "traefik.http.routers.mock-engine-secure.middlewares=mock-engine-headers@docker"
    depends_on: []
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/_system/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ----------------------------------------------------------
  # PostgreSQL Database (DESACTIVADO - usando BD externa)
  # Descomentar si se necesita una instancia local para desarrollo
  # ----------------------------------------------------------
